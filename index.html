<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Animal Kingdom</title>
    <style>
        :root { --primary: #004AAD; --accent: #FFDE59; --bg: #F0F7FF; --card-bg: #FFFFFF; --text: #004AAD; }
        [data-theme="dark"] { --primary: #FFDE59; --accent: #004AAD; --bg: #121212; --card-bg: #1E1E1E; --text: #FFFFFF; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; text-align: center; }
        header { background: var(--primary); color: var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; }
        .theme-toggle { position: absolute; right: 20px; top: 20px; background: var(--accent); border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px; gap: 12px; border-bottom: 5px solid var(--primary); justify-content: center; scrollbar-width: none; }
        .nav-btn { padding: 10px 20px; background: var(--bg); border: 3px solid var(--primary); border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--primary); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: var(--accent); }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .search-bar { width: 80%; padding: 15px; border-radius: 50px; border: 4px solid var(--primary); margin-bottom: 25px; font-size: 1.1rem; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 15px; box-shadow: 0 8px 0 var(--primary); transition: 0.3s; display: flex; flex-direction: column; }
        .art-box { width: 100%; height: 110px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); overflow: hidden; }
        .art-box img { width: 85%; height: 85%; object-fit: contain; }
        .flag-img { width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .big-text { font-size: 3.5rem; font-weight: bold; }
        .audio-btns { margin-top: auto; padding-top: 10px; display: flex; justify-content: center; gap: 8px; }
        .btn-speak { border: none; padding: 8px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { justify-content: flex-start; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🦁 ENGLISH KIDS 🦒</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">100 Flags</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Search for an animal... / Procurar animal..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const database = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({ en: l, pt: l })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"},
            {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"},
            {en: "Pink", pt: "Rosa", hex: "#FFC0CB"}, {en: "Orange", pt: "Laranja", hex: "#FFA500"},
            {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"},
            {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"},
            {en: "Gray", pt: "Cinza", hex: "#808080"}, {en: "Gold", pt: "Dourado", hex: "#FFD700"},
            {en: "Silver", pt: "Prata", hex: "#C0C0C0"}, {en: "Navy", pt: "Azul Marinho", hex: "#000080"},
            {en: "Teal", pt: "Azul-petróleo", hex: "#008080"}, {en: "Lime", pt: "Lima", hex: "#00FF00"},
            {en: "Cyan", pt: "Ciano", hex: "#00FFFF"}, {en: "Beige", pt: "Bege", hex: "#F5F5DC"},
            {en: "Maroon", pt: "Bordô", hex: "#800000"}, {en: "Olive", pt: "Oliva", hex: "#808000"}
        ],
        animals: [
            {en: "Lion", pt: "Leão", id: "lion", emo: "🦁"}, {en: "Tiger", pt: "Tigre", id: "tiger", emo: "🐯"},
            {en: "Elephant", pt: "Elefante", id: "elephant", emo: "🐘"}, {en: "Monkey", pt: "Macaco", id: "monkey", emo: "🐒"},
            {en: "Dog", pt: "Cachorro", id: "dog", emo: "🐶"}, {en: "Cat", pt: "Gato", id: "cat", emo: "🐱"},
            {en: "Rabbit", pt: "Coelho", id: "rabbit", emo: "🐰"}, {en: "Giraffe", pt: "Girafa", id: "giraffe", emo: "🦒"},
            {en: "Zebra", pt: "Zebra", id: "zebra", emo: "🦓"}, {en: "Panda", pt: "Panda", id: "panda", emo: "🐼"},
            {en: "Koala", pt: "Coala", id: "koala", emo: "🐨"}, {en: "Bear", pt: "Urso", id: "bear", emo: "🐻"},
            {en: "Pig", pt: "Porco", id: "pig", emo: "🐷"}, {en: "Cow", pt: "Vaca", id: "cow", emo: "🐮"},
            {en: "Sheep", pt: "Ovelha", id: "sheep", emo: "🐑"}, {en: "Horse", pt: "Cavalo", id: "horse", emo: "🐴"},
            {en: "Chicken", pt: "Galinha", id: "chicken", emo: "🐔"}, {en: "Duck", pt: "Pato", id: "duck", emo: "🦆"},
            {en: "Shark", pt: "Tubarão", id: "shark", emo: "🦈"}, {en: "Whale", pt: "Baleia", id: "whale", emo: "🐳"},
            {en: "Dolphin", pt: "Golfinho", id: "dolphin", emo: "🐬"}, {en: "Octopus", pt: "Polvo", id: "octopus", emo: "🐙"},
            {en: "Crab", pt: "Caranguejo", id: "crab", emo: "🦀"}, {en: "Frog", pt: "Sapo", id: "frog", emo: "🐸"},
            {en: "Snake", pt: "Cobra", id: "snake", emo: "🐍"}, {en: "Turtle", pt: "Tartaruga", id: "turtle", emo: "🐢"},
            {en: "Bee", pt: "Abelha", id: "bee", emo: "🐝"}, {en: "Butterfly", pt: "Borboleta", id: "butterfly", emo: "🦋"},
            {en: "Ant", pt: "Formiga", id: "ant", emo: "🐜"}, {en: "Ladybug", pt: "Joaninha", id: "ladybird", emo: "🐞"},
            {en: "Owl", pt: "Coruja", id: "owl", emo: "🦉"}, {en: "Eagle", pt: "Águia", id: "eagle", emo: "🦅"},
            {en: "Parrot", pt: "Papagaio", id: "parrot", emo: "🦜"}, {en: "Penguin", pt: "Pinguim", id: "penguin", emo: "🐧"},
            {en: "Bat", pt: "Morcego", id: "bat", emo: "🦇"}, {en: "Fox", pt: "Raposa", id: "fox", emo: "🦊"},
            {en: "Wolf", pt: "Lobo", id: "wolf", emo: "🐺"}, {en: "Deer", pt: "Veado", id: "deer", emo: "🦌"},
            {en: "Crocodile", pt: "Jacaré", id: "crocodile", emo: "🐊"}, {en: "Hippopotamus", pt: "Hipopótamo", id: "hippo", emo: "🦛"}
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", code: "br"}, {en: "USA", pt: "EUA", code: "us"}, {en: "UK", pt: "Reino Unido", code: "gb"},
            {en: "Japan", pt: "Japão", code: "jp"}, {en: "France", pt: "França", code: "fr"}, {en: "Italy", pt: "Itália", code: "it"},
            {en: "Germany", pt: "Alemanha", code: "de"}, {en: "Canada", pt: "Canadá", code: "ca"}, {en: "Portugal", pt: "Portugal", code: "pt"},
            {en: "Spain", pt: "Espanha", code: "es"}, {en: "Argentina", pt: "Argentina", code: "ar"}, {en: "Mexico", pt: "México", code: "mx"}
            // More flags are generated in the live app via FlagCDN
        ]
    };

    let activeCat = 'alphabet';

    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }

    function setCategory(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[activeCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let art = `<div class="big-text">${item.en}</div>`;
            if(activeCat === 'colors') art = `<div class="art-box" style="background:${item.hex}"></div>`;
            if(activeCat === 'countries') art = `<div class="art-box"><img src="https://flagcdn.com/w160/${item.code}.png" class="flag-img"></div>`;
            if(activeCat === 'animals') {
                art = `<div class="art-box"><img src="https://img.icons8.com/color/144/000000/${item.id}.png" onerror="this.parentElement.innerHTML='<div class=\'big-text\'>${item.emo}</div>'"></div>`;
            }

            card.innerHTML = `
                ${art}
                <div style="font-size: 1.4rem; font-weight: bold;">${item.en}</div>
                <div style="opacity: 0.7;">🇧🇷 ${item.pt}</div>
                <div class="audio-btns">
                    <button class="btn-speak btn-en" onclick="speak('${item.en}', 'en-US')">🇺🇸 Speak</button>
                    <button class="btn-speak btn-pt" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷 Fala</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.pitch = Math.random() > 0.5 ? 1.7 : 1.3;
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    render();
</script>
</body>
</html>
