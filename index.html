<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Aprendizado Total</title>
    <style>
        :root {
            --primary: #004AAD;
            --accent: #FFDE59;
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
            --text: #004AAD;
        }

        [data-theme="dark"] {
            --primary: #FFDE59;
            --accent: #004AAD;
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s;
            overflow-x: hidden;
        }

        header {
            background: var(--primary);
            color: var(--accent);
            padding: 30px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 30px;
            background: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 var(--text);
        }

        nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 15px;
            gap: 12px;
            border-bottom: 5px solid var(--primary);
            scrollbar-width: none;
            justify-content: center;
        }

        .nav-btn {
            padding: 12px 25px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 30px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: bold;
            color: var(--primary);
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--accent);
            transform: scale(1.1);
        }

        .container { padding: 25px; max-width: 1300px; margin: auto; }

        .search-bar {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: 4px solid var(--primary);
            margin-bottom: 30px;
            font-size: 1.2rem;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 0 var(--primary);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { transform: translateY(-12px); border-color: var(--accent); }

        .big-icon { font-size: 4rem; margin-bottom: 15px; }
        .card h2 { margin: 5px 0; font-size: 1.8rem; color: var(--primary); }
        .card .translation { font-weight: bold; color: #555; margin-bottom: 10px; }
        .card .sentence { font-size: 0.9rem; color: #008CFF; font-weight: bold; min-height: 40px; }

        .audio-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .speak-btn {
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }

        /* Color Section Special Styles */
        .color-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            nav { justify-content: flex-start; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🚀 ENGLISH KIDS 🇧🇷</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav id="cats">
    <button class="nav-btn active" onclick="setCat('alphabet', this)">🔤 ABC</button>
    <button class="nav-btn" onclick="setCat('numbers', this)">🔢 1-100</button>
    <button class="nav-btn" onclick="setCat('colors', this)">🎨 Colors</button>
    <button class="nav-btn" onclick="setCat('animals', this)">🦁 Animals</button>
    <button class="nav-btn" onclick="setCat('flags', this)">🚩 Flags</button>
    <button class="nav-btn" onclick="setCat('symbols', this)">❓ Symbols</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" id="search" placeholder="Search word or translation... / Pesquisar..." onkeyup="search()">
    <div class="grid" id="grid"></div>
</div>

<script>
    const db = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => {
            const examples = {
                A: {w: "Apple", s: "The apple is sweet."}, B: {w: "Ball", s: "The ball is big."},
                C: {w: "Cat", s: "The cat says meow."}, D: {w: "Dog", s: "The dog is happy."},
                E: {w: "Elephant", s: "The elephant is grey."}, F: {w: "Fish", s: "The fish swims."},
                G: {w: "Grape", s: "I like grapes."}, H: {w: "House", s: "My house is blue."}
            };
            return { 
                en: l, pt: l, 
                word: examples[l]?.w || "Word", 
                sentence: examples[l]?.s || `${l} is a great letter!` 
            };
        }),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#004AAD"},
            {en: "Yellow", pt: "Amarelo", hex: "#FFDE59"}, {en: "Green", pt: "Verde", hex: "#28A745"},
            {en: "Orange", pt: "Laranja", hex: "#FF8C00"}, {en: "Pink", pt: "Rosa", hex: "#FFC0CB"},
            {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#8B4513"},
            {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"}
        ],
        animals: [
            {en: "Lion", pt: "Leão"}, {en: "Tiger", pt: "Tigre"}, {en: "Elephant", pt: "Elefante"},
            {en: "Giraffe", pt: "Girafa"}, {en: "Zebra", pt: "Zebra"}, {en: "Monkey", pt: "Macaco"},
            {en: "Shark", pt: "Tubarão"}, {en: "Whale", pt: "Baleia"}, {en: "Dolphin", pt: "Golfinho"},
            {en: "Snake", pt: "Cobra"}, {en: "Eagle", pt: "Águia"}, {en: "Parrot", pt: "Papagaio"},
            {en: "Dog", pt: "Cachorro"}, {en: "Cat", pt: "Gato"}, {en: "Cow", pt: "Vaca"}
        ],
        flags: [
            {en: "Brazil", pt: "Brasil", f: "🇧🇷"}, {en: "USA", pt: "EUA", f: "🇺🇸"},
            {en: "UK", pt: "Reino Unido", f: "🇬🇧"}, {en: "Canada", pt: "Canadá", f: "🇨🇦"},
            {en: "Japan", pt: "Japão", f: "🇯🇵"}, {en: "France", pt: "França", f: "🇫🇷"},
            {en: "Portugal", pt: "Portugal", f: "🇵🇹"}, {en: "Argentina", pt: "Argentina", f: "🇦🇷"}
        ],
        symbols: [
            {en: "Comma", pt: "Vírgula", icon: ","}, {en: "Full Stop", pt: "Ponto Final", icon: "."},
            {en: "Question Mark", pt: "Interrogação", icon: "?"}, {en: "Exclamation", pt: "Exclamação", icon: "!"},
            {en: "Brackets", pt: "Parênteses", icon: "( )"}, {en: "Plus", pt: "Mais", icon: "+"},
            {en: "Minus", pt: "Menos", icon: "-"}, {en: "Equals", pt: "Igual", icon: "="}
        ]
    };

    let activeCat = 'alphabet';

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function setCat(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        db[activeCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let visual = "";
            if(activeCat === 'colors') visual = `<div class="color-circle" style="background:${item.hex}"></div>`;
            if(activeCat === 'flags') visual = `<div class="big-icon">${item.f}</div>`;
            if(activeCat === 'symbols') visual = `<div class="big-icon" style="color:var(--primary)">${item.icon}</div>`;
            if(activeCat === 'alphabet') visual = `<div class="big-icon">${item.en}</div>`;

            card.innerHTML = `
                ${visual}
                <h2>${item.en}</h2>
                <div class="translation">🇧🇷 ${item.pt}</div>
                ${item.word ? `<div class="sentence">${item.word} <br> <small>${item.sentence}</small></div>` : ''}
                <div class="audio-row">
                    <button class="speak-btn btn-en" onclick="speak('${item.en}', 'en-US')">🇺🇸 EN</button>
                    <button class="speak-btn btn-pt" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷 PT</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.rate = 0.75;
        window.speechSynthesis.speak(msg);
    }

    function search() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    render();
</script>
</body>
</html>
