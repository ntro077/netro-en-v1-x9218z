<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Vozes Divertidas!</title>
    <style>
        :root {
            --primary: #004AAD;
            --accent: #FFDE59;
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
            --text: #004AAD;
        }

        [data-theme="dark"] {
            --primary: #FFDE59;
            --accent: #004AAD;
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s;
            text-align: center;
        }

        header {
            background: var(--primary);
            color: var(--accent);
            padding: 25px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 25px;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
        }

        nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 15px;
            gap: 12px;
            border-bottom: 5px solid var(--primary);
            justify-content: center;
            scrollbar-width: none;
        }

        .nav-btn {
            padding: 12px 25px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--accent);
            transform: scale(1.1);
        }

        .container { padding: 20px; max-width: 1200px; margin: auto; }

        .search-bar {
            width: 90%;
            padding: 18px;
            border-radius: 50px;
            border: 4px solid var(--primary);
            margin-bottom: 30px;
            font-size: 1.2rem;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 0 var(--primary);
            transition: 0.3s;
            position: relative;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .card:hover { transform: translateY(-10px) rotate(1deg); }

        .visual-element { font-size: 3.5rem; margin-bottom: 10px; }
        .color-box { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 10px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .btn-audio {
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }

        @media (max-width: 600px) {
            nav { justify-content: flex-start; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🚀 ENGLISH KIDS 🇧🇷</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav id="navbar">
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('flags', this)">Flags</button>
    <button class="nav-btn" onclick="setCategory('symbols', this)">Symbols</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Search... / Pesquisar..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const database = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({ en: l, pt: l })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"},
            {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"},
            {en: "Pink", pt: "Rosa", hex: "#FFC0CB"}, {en: "Orange", pt: "Laranja", hex: "#FFA500"}
        ],
        animals: [
            {en: "Lion", pt: "Leão"}, {en: "Tiger", pt: "Tigre"}, {en: "Monkey", pt: "Macaco"},
            {en: "Elephant", pt: "Elefante"}, {en: "Giraffe", pt: "Girafa"}, {en: "Bee", pt: "Abelha"}
        ],
        flags: [
            {en: "Brazil", pt: "Brasil", emoji: "🇧🇷"}, {en: "USA", pt: "EUA", emoji: "🇺🇸"},
            {en: "Japan", pt: "Japão", emoji: "🇯🇵"}, {en: "UK", pt: "Reino Unido", emoji: "🇬🇧"}
        ],
        symbols: [
            {en: "Comma", pt: "Vírgula", s: ","}, {en: "Full Stop", pt: "Ponto Final", s: "."},
            {en: "Question Mark", pt: "Interrogação", s: "?"}, {en: "Exclamation", pt: "Exclamação", s: "!"}
        ]
    };

    let current = 'alphabet';

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function setCategory(cat, btn) {
        current = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[current].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let visual = `<div class="visual-element">${item.en}</div>`;
            if(current === 'colors') visual = `<div class="color-box" style="background:${item.hex}"></div>`;
            if(current === 'flags') visual = `<div class="visual-element">${item.emoji}</div>`;
            if(current === 'symbols') visual = `<div class="visual-element">${item.s}</div>`;

            card.innerHTML = `
                ${visual}
                <div style="font-size: 1.5rem; font-weight: bold;">${item.en}</div>
                <div style="opacity: 0.7;">🇧🇷 ${item.pt}</div>
                <div style="margin-top: 15px;">
                    <button class="btn-audio btn-en" onclick="speak('${item.en}', 'en-US')">🇺🇸 Speak</button>
                    <button class="btn-audio btn-pt" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷 Fala</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- SMART CHILD VOICE ENGINE ---
    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;

        // Randomly choose between "Boy" and "Girl" style
        // We simulate a girl voice with high pitch and boy with medium pitch
        const isGirl = Math.random() > 0.5;
        
        if (isGirl) {
            msg.pitch = 1.6; // High, sweet voice
            msg.rate = 0.9;
        } else {
            msg.pitch = 1.2; // Energetic boy voice
            msg.rate = 0.85;
        }

        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    render();
</script>
</body>
</html>
