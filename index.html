<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - A to Z Master</title>
    <style>
        :root { --primary: #004AAD; --accent: #FFDE59; --bg: #F0F7FF; --card-bg: #FFFFFF; --text: #004AAD; }
        [data-theme="dark"] { --primary: #FFDE59; --accent: #004AAD; --bg: #121212; --card-bg: #1E1E1E; --text: #FFFFFF; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; text-align: center; }
        header { background: var(--primary); color: var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .theme-toggle { position: absolute; right: 20px; top: 20px; background: var(--accent); border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px; gap: 12px; border-bottom: 5px solid var(--primary); justify-content: center; scrollbar-width: none; }
        .nav-btn { padding: 10px 20px; background: var(--bg); border: 3px solid var(--primary); border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--primary); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: var(--accent); transform: scale(1.1); }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .search-bar { width: 85%; padding: 15px; border-radius: 50px; border: 4px solid var(--primary); margin-bottom: 25px; font-size: 1.1rem; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 20px; box-shadow: 0 8px 0 var(--primary); transition: 0.3s; border: 2px solid transparent; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .art-box { width: 100%; height: 110px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); overflow: hidden; font-size: 4rem; font-weight: bold; }
        .art-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .example-text { font-size: 0.9rem; color: #008CFF; font-weight: bold; margin-top: 5px; }
        .audio-btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .btn-speak { border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { justify-content: flex-start; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🚀 ENGLISH KIDS 🇧🇷</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC (A-Z)</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">20 Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">Flags</button>
    <button class="nav-btn" onclick="setCategory('symbols', this)">Symbols</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Type to learn... / Digite para aprender..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const alphabetData = [
        {l: "A", w: "Apple", pt: "Maçã"}, {l: "B", w: "Ball", pt: "Bola"}, {l: "C", w: "Cat", pt: "Gato"},
        {l: "D", w: "Dog", pt: "Cachorro"}, {l: "E", w: "Elephant", pt: "Elefante"}, {l: "F", w: "Fish", pt: "Peixe"},
        {l: "G", w: "Grape", pt: "Uva"}, {l: "H", w: "House", pt: "Casa"}, {l: "I", w: "Ice cream", pt: "Sorvete"},
        {l: "J", w: "Juice", pt: "Suco"}, {l: "K", w: "Kite", pt: "Pipa"}, {l: "L", w: "Lion", pt: "Leão"},
        {l: "M", w: "Monkey", pt: "Macaco"}, {l: "N", w: "Nose", pt: "Nariz"}, {l: "O", w: "Orange", pt: "Laranja"},
        {l: "P", w: "Pig", pt: "Porco"}, {l: "Q", w: "Queen", pt: "Rainha"}, {l: "R", w: "Rabbit", pt: "Coelho"},
        {l: "S", w: "Sun", pt: "Sol"}, {l: "T", w: "Tiger", pt: "Tigre"}, {l: "U", w: "Umbrella", pt: "Guarda-chuva"},
        {l: "V", w: "Van", pt: "Van"}, {l: "W", w: "Water", pt: "Água"}, {l: "X", w: "Xylophone", pt: "Xilofone"},
        {l: "Y", w: "Yo-yo", pt: "Ioiô"}, {l: "Z", w: "Zebra", pt: "Zebra"}
    ];

    const database = {
        alphabet: alphabetData.map(item => ({ en: item.l, pt: item.l, ex: `${item.l} is for ${item.w}`, exPt: `${item.w} (${item.pt})` })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"},
            {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"},
            {en: "Pink", pt: "Rosa", hex: "#FFC0CB"}, {en: "Orange", pt: "Laranja", hex: "#FFA500"},
            {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"},
            {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"},
            {en: "Gray", pt: "Cinza", hex: "#808080"}, {en: "Gold", pt: "Dourado", hex: "#FFD700"},
            {en: "Silver", pt: "Prata", hex: "#C0C0C0"}, {en: "Beige", pt: "Bege", hex: "#F5F5DC"},
            {en: "Navy", pt: "Azul Marinho", hex: "#000080"}, {en: "Teal", pt: "Azul-petróleo", hex: "#008080"},
            {en: "Sky Blue", pt: "Azul Céu", hex: "#87CEEB"}, {en: "Lime", pt: "Lima", hex: "#00FF00"},
            {en: "Coral", pt: "Coral", hex: "#FF7F50"}, {en: "Maroon", pt: "Bordô", hex: "#800000"}
        ],
        animals: [
            {en: "Lion", pt: "Leão", icon: "lion"}, {en: "Tiger", pt: "Tigre", icon: "tiger"},
            {en: "Elephant", pt: "Elefante", icon: "elephant"}, {en: "Monkey", pt: "Macaco", icon: "monkey"},
            {en: "Dog", pt: "Cachorro", icon: "dog"}, {en: "Cat", pt: "Gato", icon: "cat"},
            {en: "Rabbit", pt: "Coelho", icon: "rabbit"}, {en: "Panda", pt: "Panda", icon: "panda"},
            {en: "Horse", pt: "Cavalo", icon: "horse"}, {en: "Cow", pt: "Vaca", icon: "cow"}
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", code: "br"}, {en: "USA", pt: "EUA", code: "us"},
            {en: "UK", pt: "Reino Unido", code: "gb"}, {en: "Japan", pt: "Japão", code: "jp"},
            {en: "France", pt: "França", code: "fr"}, {en: "Germany", pt: "Alemanha", code: "de"},
            {en: "Italy", pt: "Itália", code: "it"}, {en: "Canada", pt: "Canadá", code: "ca"}
        ],
        symbols: [
            {en: "Question Mark", pt: "Interrogação", s: "?"}, {en: "Exclamation", pt: "Exclamação", s: "!"},
            {en: "Comma", pt: "Vírgula", s: ","}, {en: "Plus", pt: "Mais", s: "+"}
        ]
    };

    let activeCat = 'alphabet';

    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }

    function setCategory(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[activeCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            let art = `<div class="art-box">${item.en}</div>`;
            if(activeCat === 'colors') art = `<div class="art-box" style="background:${item.hex}"></div>`;
            if(activeCat === 'countries') art = `<div class="art-box"><img src="https://flagcdn.com/w160/${item.code}.png"></div>`;
            if(activeCat === 'animals') art = `<div class="art-box"><img src="https://img.icons8.com/color/144/000000/${item.icon}.png" onerror="this.src='🐾'"></div>`;
            if(activeCat === 'symbols') art = `<div class="art-box">${item.s}</div>`;

            card.innerHTML = `
                ${art}
                <div style="font-size: 1.5rem; font-weight: bold;">${item.en}</div>
                ${item.ex ? `<div class="example-text">${item.ex}</div>` : ''}
                <div style="opacity: 0.7; font-size: 0.9rem;">🇧🇷 ${item.exPt || item.pt}</div>
                <div class="audio-btns">
                    <button class="btn-speak btn-en" onclick="speak('${item.en}', 'en-US')">🇺🇸 Speak</button>
                    <button class="btn-speak btn-pt" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷 Fala</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.pitch = Math.random() > 0.5 ? 1.8 : 1.3; // Boy/Girl child voice
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    render();
</script>
</body>
</html>
