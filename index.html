    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids by Teacher Rush</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004AAD; --accent: #FFDE59; --bg: #F0F7FF; --card-bg: #FFFFFF; --text: #004AAD; }
        [data-theme="dark"] { --primary: #FFDE59; --accent: #004AAD; --bg: #121212; --card-bg: #1E1E1E; --text: #FFFFFF; }
        body { font-family: 'Fredoka', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; text-align: center; }
        header { background: var(--primary); color: var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; }
        .theme-toggle { position: absolute; right: 20px; top: 20px; background: var(--accent); border: none; padding: 10px; border-radius: 50%; cursor: pointer; }
        nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px; gap: 12px; border-bottom: 5px solid var(--primary); justify-content: center; scrollbar-width: none; }
        .nav-btn { font-family: 'Fredoka', sans-serif; padding: 10px 20px; background: var(--bg); border: 3px solid var(--primary); border-radius: 50px; cursor: pointer; font-weight: 600; color: var(--primary); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: var(--accent); }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .search-bar { font-family: 'Fredoka', sans-serif; width: 85%; padding: 15px; border-radius: 50px; border: 4px solid var(--primary); margin-bottom: 25px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 12px; box-shadow: 0 6px 0 var(--primary); display: flex; flex-direction: column; height: 260px; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .art-box { width: 100%; height: 110px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); font-size: 4.5rem; }
        .flag-img { width: 75%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .audio-btns { margin-top: auto; display: flex; justify-content: center; gap: 8px; }
        .btn-speak { font-family: 'Fredoka', sans-serif; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; flex: 1; font-size: 1rem; }
        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }
        footer { background: var(--primary); color: var(--accent); padding: 20px; margin-top: 40px; font-weight: 600; }
        footer a { color: #FFFFFF; text-decoration: none; border-bottom: 2px solid var(--accent); }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { justify-content: flex-start; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1 style="margin:0; letter-spacing: 2px;">ENGLISH KIDS</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">100 Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">Flags</button>

<div class="container">
    <input type="text" class="search-bar" placeholder="Search... / Buscar..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<footer>
    Made by <strong>English Teacher Rush</strong> | 
    <a href="https://ntro077.github.io/my-teaching-site/" target="_blank">Visit my Website</a>
</footer>

            card.innerHTML = `${art}
                <div style="font-size: 1.2rem; font-weight: bold; margin-top:5px;">${item.en}</div>
                <div style="opacity: 0.6; font-size: 0.9rem;">${item.pt}</div>
                <div class="audio-btns">
                    <button class="btn-speak btn-en" onclick="speak('${item.en}', 'en-US')">EN</button>
                    <button class="btn-speak btn-pt" onclick="speak('${item.pt}', 'pt-BR')">PT</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        
        // BETTER AUDIO LOGIC FOR TEACHER RUSH 2.0
        let textToSpeak = text.toLowerCase();
        
        // If it's the alphabet category, we add a tiny pause to make the letter longer
        if(activeCat === 'alphabet') {
            textToSpeak = textToSpeak + "...";
        }

        const msg = new SpeechSynthesisUtterance(textToSpeak);
        msg.lang = lang;
        msg.pitch = 1.1; // Friendly child-like pitch
        msg.rate = 0.7;  // SLOWER for better clarity
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
        });
    }

    render();
</script>
</body>
</html>
