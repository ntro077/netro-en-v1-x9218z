<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Clean & Updated</title>
    <style>
        :root { --primary: #004AAD; --accent: #FFDE59; --bg: #F0F7FF; --card-bg: #FFFFFF; --text: #004AAD; }
        [data-theme="dark"] { --primary: #FFDE59; --accent: #004AAD; --bg: #121212; --card-bg: #1E1E1E; --text: #FFFFFF; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; text-align: center; }
        header { background: var(--primary); color: var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .theme-toggle { position: absolute; right: 20px; top: 20px; background: var(--accent); border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px; gap: 12px; border-bottom: 5px solid var(--primary); justify-content: center; scrollbar-width: none; }
        .nav-btn { padding: 10px 20px; background: var(--bg); border: 3px solid var(--primary); border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--primary); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: var(--accent); transform: scale(1.05); }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .search-bar { width: 85%; padding: 15px; border-radius: 50px; border: 4px solid var(--primary); margin-bottom: 25px; font-size: 1.1rem; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 12px; box-shadow: 0 6px 0 var(--primary); display: flex; flex-direction: column; height: 240px; }
        .art-box { width: 100%; height: 100px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); font-size: 4.5rem; }
        .flag-img { width: 75%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .audio-btns { margin-top: auto; display: flex; justify-content: center; gap: 8px; padding-bottom: 2px; }
        .btn-speak { border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; flex: 1; transition: 0.2s; }
        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { justify-content: flex-start; } .card { height: 230px; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>ENGLISH KIDS</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">100 Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">Flags</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Search... / Buscar..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const database = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({ en: l, pt: l })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"}, {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"}, {en: "Pink", pt: "Rosa", hex: "#FFC0CB"}, {en: "Orange", pt: "Laranja", hex: "#FFA500"}, {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"}, {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"}, {en: "Gray", pt: "Cinza", hex: "#808080"}, {en: "Gold", pt: "Dourado", hex: "#FFD700"}, {en: "Silver", pt: "Prata", hex: "#C0C0C0"}, {en: "Cyan", pt: "Ciano", hex: "#00FFFF"}, {en: "Navy", pt: "Azul Marinho", hex: "#000080"}, {en: "Teal", pt: "Azul-petróleo", hex: "#008080"}, {en: "Lime", pt: "Lima", hex: "#00FF00"}, {en: "Sky Blue", pt: "Azul Céu", hex: "#87CEEB"}, {en: "Coral", pt: "Coral", hex: "#FF7F50"}, {en: "Maroon", pt: "Bordô", hex: "#800000"}
        ],
        animals: [
            {en: "Lion", pt: "Leão", art: "🦁"}, {en: "Tiger", pt: "Tigre", art: "🐯"}, {en: "Elephant", pt: "Elefante", art: "🐘"}, {en: "Monkey", pt: "Macaco", art: "🐒"}, {en: "Dog", pt: "Cachorro", art: "🐶"}, {en: "Cat", pt: "Gato", art: "🐱"}, {en: "Rabbit", pt: "Coelho", art: "🐰"}, {en: "Giraffe", pt: "Girafa", art: "🦒"}, {en: "Zebra", pt: "Zebra", art: "🦓"}, {en: "Panda", pt: "Panda", art: "🐼"}, {en: "Bear", pt: "Urso", art: "🐻"}, {en: "Pig", pt: "Porco", art: "🐷"}, {en: "Cow", pt: "Vaca", art: "🐮"}, {en: "Horse", pt: "Cavalo", art: "🐴"}, {en: "Sheep", pt: "Ovelha", art: "🐑"}, {en: "Goat", pt: "Cabra", art: "🐐"}, {en: "Camel", pt: "Camelo", art: "🐪"}, {en: "Llama", pt: "Lhama", art: "🦙"}, {en: "Kangaroo", pt: "Canguru", art: "🦘"}, {en: "Koala", pt: "Coala", art: "🐨"},
            {en: "Wolf", pt: "Lobo", art: "🐺"}, {en: "Fox", pt: "Raposa", art: "🦊"}, {en: "Deer", pt: "Veado", art: "🦌"}, {en: "Rhinoceros", pt: "Rinoceronte", art: "🦏"}, {en: "Hippopotamus", pt: "Hipopótamo", art: "🦛"}, {en: "Crocodile", pt: "Jacaré", art: "🐊"}, {en: "Snake", pt: "Cobra", art: "🐍"}, {en: "Lizard", pt: "Lagarto", art: "🦎"}, {en: "Turtle", pt: "Tartaruga", art: "🐢"}, {en: "Frog", pt: "Sapo", art: "🐸"}, {en: "Shark", pt: "Tubarão", art: "🦈"}, {en: "Whale", pt: "Baleia", art: "🐳"}, {en: "Dolphin", pt: "Golfinho", art: "🐬"}, {en: "Octopus", pt: "Polvo", art: "🐙"}, {en: "Crab", pt: "Caranguejo", art: "🦀"}, {en: "Lobster", pt: "Lagosta", art: "🦞"}, {en: "Shrimp", pt: "Camarão", art: "🦐"}, {en: "Squid", pt: "Lula", art: "🦑"}, {en: "Fish", pt: "Peixe", art: "🐟"}, {en: "Tropical Fish", pt: "Peixe Tropical", art: "🐠"},
            {en: "Blowfish", pt: "Baiacu", art: "🐡"}, {en: "Eagle", pt: "Águia", art: "🦅"}, {en: "Owl", pt: "Coruja", art: "🦉"}, {en: "Parrot", pt: "Papagaio", art: "🦜"}, {en: "Penguin", pt: "Pinguim", art: "🐧"}, {en: "Duck", pt: "Pato", art: "🦆"}, {en: "Swan", pt: "Cisne", art: "🦢"}, {en: "Chicken", pt: "Galinha", art: "🐔"}, {en: "Rooster", pt: "Galo", art: "🐓"}, {en: "Turkey", pt: "Peru", art: "🦃"}, {en: "Flamingo", pt: "Flamingo", art: "🦩"}, {en: "Peacock", pt: "Pavão", art: "🦚"}, {en: "Dove", pt: "Pomba", art: "🕊️"}, {en: "Bat", pt: "Morcego", art: "🦇"}, {en: "Bee", pt: "Abelha", art: "🐝"}, {en: "Butterfly", pt: "Borboleta", art: "🦋"}, {en: "Ladybug", pt: "Joaninha", art: "🐞"}, {en: "Ant", pt: "Formiga", art: "🐜"}, {en: "Spider", pt: "Aranha", art: "🕷️"}, {en: "Scorpion", pt: "Escorpião", art: "🦂"},
            {en: "Snail", pt: "Caracol", art: "🐌"}, {en: "Caterpillar", pt: "Lagarta", art: "🐛"}, {en: "Dragonfly", pt: "Libélula", art: "🦋"}, {en: "Cricket", pt: "Grilo", art: "🦗"}, {en: "Gorilla", pt: "Gorila", art: "🦍"}, {en: "Chimpanzee", pt: "Chimpanzé", art: "🐒"}, {en: "Sloth", pt: "Preguiça", art: "🦥"}, {en: "Otter", pt: "Lontra", art: "🦦"}, {en: "Beaver", pt: "Castor", art: "🦫"}, {en: "Badger", pt: "Teixugo", art: "🦡"}, {en: "Hedgehog", pt: "Ouriço", art: "🦔"}, {en: "Mouse", pt: "Camundongo", art: "🐭"}, {en: "Rat", pt: "Rato", art: "🐀"}, {en: "Hamster", pt: "Hamster", art: "🐹"}, {en: "Squirrel", pt: "Esquilo", art: "🐿️"}, {en: "Skunk", pt: "Gambá", art: "🦨"}, {en: "Raccoon", pt: "Guaxinim", art: "🦝"}, {en: "Hyena", pt: "Hiena", art: "🦧"}, {en: "Ox", pt: "Boi", art: "🐂"}, {en: "Water Buffalo", pt: "Búfalo", art: "🐃"},
            {en: "Ram", pt: "Carneiro", art: "🐏"}, {en: "Donkey", pt: "Burro", art: "🫏"}, {en: "Seal", pt: "Foca", art: "🦭"}, {en: "Walrus", pt: "Morsa", art: "🦣"}, {en: "Seahorse", pt: "Cavalo-marinho", art: "🧜"}, {en: "Jellyfish", pt: "Água-viva", art: "🪼"}, {en: "Starfish", pt: "Estrela-do-mar", art: "🌟"}, {en: "Coral", pt: "Coral", art: "🪸"}, {en: "Shell", pt: "Concha", art: "🐚"}, {en: "Mosquito", pt: "Mosquito", art: "🦟"}, {en: "Worm", pt: "Minhoca", art: "🪱"}, {en: "Fly", pt: "Mosca", art: "🪰"}, {en: "Beetle", pt: "Besouro", art: "🪲"}, {en: "Cockroach", pt: "Barata", art: "🪳"}, {en: "Cicada", pt: "Cigarra", art: "🦗"}, {en: "Grasshopper", pt: "Gafanhoto", art: "🦗"}, {en: "Platypus", pt: "Ornitorrinco", art: "🦆"}, {en: "Dinosaur", pt: "Dinossauro", art: "🦖"}, {en: "T-Rex", pt: "T-Rex", art: "🦖"}, {en: "Dragon", pt: "Dragão", art: "🐲"}
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", c: "br"}, {en: "USA", pt: "EUA", c: "us"}, {en: "UK", pt: "Reino Unido", c: "gb"}, {en: "Canada", pt: "Canadá", c: "ca"}, {en: "France", pt: "França", c: "fr"}, {en: "Germany", pt: "Alemanha", c: "de"}, {en: "Italy", pt: "Itália", c: "it"}, {en: "Japan", pt: "Japão", c: "jp"}, {en: "China", pt: "China", c: "cn"}, {en: "Mexico", pt: "México", c: "mx"}, {en: "Argentina", pt: "Argentina", c: "ar"}, {en: "Portugal", pt: "Portugal", c: "pt"}, {en: "Spain", pt: "Espanha", c: "es"}, {en: "Australia", pt: "Austrália", c: "au"}, {en: "Russia", pt: "Rússia", c: "ru"}, {en: "India", pt: "Índia", c: "in"}, {en: "Chile", pt: "Chile", c: "cl"}, {en: "Colombia", pt: "Colômbia", c: "co"}, {en: "Peru", pt: "Peru", c: "pe"}, {en: "South Korea", pt: "Coreia do Sul", c: "kr"}, {en: "Turkey", pt: "Turquia", c: "tr"}, {en: "Egypt", pt: "Egito", c: "eg"}, {en: "Netherlands", pt: "Holanda", c: "nl"}, {en: "Switzerland", pt: "Suíça", c: "ch"}, {en: "Norway", pt: "Noruega", c: "no"}, {en: "Sweden", pt: "Suécia", c: "se"}, {en: "Ireland", pt: "Irlanda", c: "ie"}, {en: "Denmark", pt: "Dinamarca", c: "dk"}, {en: "Finland", pt: "Finlândia", c: "fi"}, {en: "Austria", pt: "Áustria", c: "at"}, {en: "Greece", pt: "Grécia", c: "gr"}, {en: "Palestine", pt: "Palestina", c: "ps"}, {en: "Poland", pt: "Polônia", c: "pl"}, {en: "Vietnam", pt: "Vietnã", c: "vn"}, {en: "Thailand", pt: "Tailândia", c: "th"}, {en: "Philippines", pt: "Filipinas", c: "ph"}, {en: "Indonesia", pt: "Indonésia", c: "id"}, {en: "Malaysia", pt: "Malásia", c: "my"}, {en: "Singapore", pt: "Singapura", c: "sg"}, {en: "Uruguay", pt: "Uruguai", c: "uy"}, {en: "Paraguay", pt: "Paraguai", c: "py"}, {en: "Bolivia", pt: "Bolívia", c: "bo"}, {en: "Ecuador", pt: "Equador", c: "ec"}, {en: "Venezuela", pt: "Venezuela", c: "ve"}, {en: "Panama", pt: "Panamá", c: "pa"}, {en: "Costa Rica", pt: "Costa Rica", c: "cr"}, {en: "Jamaica", pt: "Jamaica", c: "jm"}, {en: "Cuba", pt: "Cuba", c: "cu"}, {en: "Morocco", pt: "Marrocos", c: "ma"}, {en: "South Africa", pt: "África do Sul", c: "za"}, {en: "Belgium", pt: "Bélgica", c: "be"}
        ]
    };

    let activeCat = 'alphabet';
    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }

    function setCategory(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[activeCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let artContent = `<div class="art-box">${item.en}</div>`;
            if(activeCat === 'colors') artContent = `<div class="art-box" style="background:${item.hex}"></div>`;
            if(activeCat === 'countries') artContent = `<div class="art-box"><img src="https://flagcdn.com/w160/${item.c}.png" class="flag-img" alt="Flag"></div>`;
            if(activeCat === 'animals') artContent = `<div class="art-box">${item.art}</div>`;

            card.innerHTML = `
                ${artContent}
                <div style="font-size: 1.2rem; font-weight: bold; margin-top:5px;">${item.en}</div>
                <div style="opacity: 0.6; font-size: 0.9rem;">${item.pt}</div>
                <div class="audio-btns">
                    <button class="btn-speak btn-en" onclick="speak('${item.en}', 'en-US')">EN</button>
                    <button class="btn-speak btn-pt" onclick="speak('${item.pt}', 'pt-BR')">PT</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.pitch = 1.4;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
        });
    }

    render();
</script>
</body>
</html>
