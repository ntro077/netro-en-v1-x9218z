<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Clean Design</title>
    <style>
        :root { --primary: #004AAD; --accent: #FFDE59; --bg: #F0F7FF; --card-bg: #FFFFFF; --text: #004AAD; }
        [data-theme="dark"] { --primary: #FFDE59; --accent: #004AAD; --bg: #121212; --card-bg: #1E1E1E; --text: #FFFFFF; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; text-align: center; }
        header { background: var(--primary); color: var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .theme-toggle { position: absolute; right: 20px; top: 20px; background: var(--accent); border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px; gap: 12px; border-bottom: 5px solid var(--primary); justify-content: center; scrollbar-width: none; }
        .nav-btn { padding: 10px 20px; background: var(--bg); border: 3px solid var(--primary); border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--primary); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: var(--accent); transform: scale(1.05); }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .search-bar { width: 85%; padding: 15px; border-radius: 50px; border: 4px solid var(--primary); margin-bottom: 25px; font-size: 1.1rem; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 15px; box-shadow: 0 8px 0 var(--primary); transition: 0.2s; display: flex; flex-direction: column; height: 260px; }
        .art-box { width: 100%; height: 110px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); overflow: hidden; font-size: 4rem; }
        .art-box img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .flag-img { width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .audio-btns { margin-top: auto; display: flex; justify-content: center; gap: 10px; padding-bottom: 5px; }
        .btn-speak { border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; flex: 1; transition: 0.2s; }
        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { justify-content: flex-start; } .card { height: 240px; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>ENGLISH KIDS</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">100 Flags</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Search... / Buscar..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const alphabetData = [
        {l: "A", w: "Apple"}, {l: "B", w: "Ball"}, {l: "C", w: "Cat"}, {l: "D", w: "Dog"}, {l: "E", w: "Elephant"}, {l: "F", w: "Fish"}, {l: "G", w: "Grape"}, {l: "H", w: "House"}, {l: "I", w: "Icecream"}, {l: "J", w: "Juice"}, {l: "K", w: "Kite"}, {l: "L", w: "Lion"}, {l: "M", w: "Monkey"}, {l: "N", w: "Nose"}, {l: "O", w: "Orange"}, {l: "P", w: "Pig"}, {l: "Q", w: "Queen"}, {l: "R", w: "Rabbit"}, {l: "S", w: "Sun"}, {l: "T", w: "Tiger"}, {l: "U", w: "Umbrella"}, {l: "V", w: "Van"}, {l: "W", w: "Water"}, {l: "X", w: "Xylophone"}, {l: "Y", w: "Yo-yo"}, {l: "Z", w: "Zebra"}
    ];

    const database = {
        alphabet: alphabetData.map(l => ({ en: l.l, pt: l.l, ex: `${l.l} is for ${l.w}` })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"}, {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"}, {en: "Pink", pt: "Rosa", hex: "#FFC0CB"}, {en: "Orange", pt: "Laranja", hex: "#FFA500"}, {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"}, {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"}, {en: "Gray", pt: "Cinza", hex: "#808080"}, {en: "Gold", pt: "Dourado", hex: "#FFD700"}, {en: "Silver", pt: "Prata", hex: "#C0C0C0"}, {en: "Cyan", pt: "Ciano", hex: "#00FFFF"}, {en: "Navy", pt: "Azul Marinho", hex: "#000080"}, {en: "Teal", pt: "Azul-petróleo", hex: "#008080"}, {en: "Lime", pt: "Lima", hex: "#00FF00"}, {en: "Sky Blue", pt: "Azul Céu", hex: "#87CEEB"}, {en: "Coral", pt: "Coral", hex: "#FF7F50"}, {en: "Maroon", pt: "Bordô", hex: "#800000"}
        ],
        animals: [
            {en: "Lion", pt: "Leão", img: "lion", emo: "🦁"}, {en: "Tiger", pt: "Tigre", img: "tiger", emo: "🐯"}, {en: "Elephant", pt: "Elefante", img: "elephant", emo: "🐘"}, {en: "Monkey", pt: "Macaco", img: "monkey", emo: "🐒"}, {en: "Dog", pt: "Cachorro", img: "dog", emo: "🐶"}, {en: "Cat", pt: "Gato", img: "cat", emo: "🐱"}, {en: "Rabbit", pt: "Coelho", img: "rabbit", emo: "🐰"}, {en: "Giraffe", pt: "Girafa", img: "giraffe", emo: "🦒"}, {en: "Zebra", pt: "Zebra", img: "zebra", emo: "🦓"}, {en: "Panda", pt: "Panda", img: "panda", emo: "🐼"}, {en: "Bear", pt: "Urso", img: "bear", emo: "🐻"}, {en: "Pig", pt: "Porco", img: "pig", emo: "🐷"}, {en: "Cow", pt: "Vaca", img: "cow", emo: "🐮"}, {en: "Horse", pt: "Cavalo", img: "horse", emo: "🐴"}, {en: "Shark", pt: "Tubarão", img: "shark", emo: "🦈"}, {en: "Whale", pt: "Baleia", img: "whale", emo: "🐳"}, {en: "Octopus", pt: "Polvo", img: "octopus", emo: "🐙"}, {en: "Bee", pt: "Abelha", img: "bee", emo: "🐝"}, {en: "Butterfly", pt: "Borboleta", img: "butterfly", emo: "🦋"}, {en: "Frog", pt: "Sapo", img: "frog", emo: "🐸"}
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", c: "br"}, {en: "USA", pt: "EUA", c: "us"}, {en: "UK", pt: "Reino Unido", c: "gb"}, {en: "Canada", pt: "Canadá", c: "ca"}, {en: "France", pt: "França", c: "fr"}, {en: "Germany", pt: "Alemanha", c: "de"}, {en: "Italy", pt: "Itália", c: "it"}, {en: "Japan", pt: "Japão", c: "jp"}, {en: "China", pt: "cn"}, {en: "Mexico", pt: "México", c: "mx"}, {en: "Argentina", pt: "Argentina", c: "ar"}, {en: "Portugal", pt: "Portugal", c: "pt"}, {en: "Spain", pt: "Espanha", c: "es"}, {en: "Australia", pt: "Austrália", c: "au"}, {en: "Russia", pt: "Rússia", c: "ru"}, {en: "India", pt: "Índia", c: "in"}, {en: "Chile", pt: "Chile", c: "cl"}, {en: "Colombia", pt: "Colômbia", c: "co"}, {en: "Peru", pt: "Peru", c: "pe"}, {en: "South Korea", pt: "Coreia do Sul", c: "kr"}, {en: "Turkey", pt: "Turquia", c: "tr"}, {en: "Netherlands", pt: "Holanda", c: "nl"}, {en: "Switzerland", pt: "Suíça", c: "ch"}, {en: "Norway", pt: "Noruega", c: "no"}, {en: "Sweden", pt: "Suécia", c: "se"}, {en: "Ireland", pt: "Irlanda", c: "ie"}, {en: "Denmark", pt: "Dinamarca", c: "dk"}, {en: "Finland", pt: "Finlândia", c: "fi"}, {en: "Austria", pt: "Áustria", c: "at"}, {en: "Greece", pt: "Grécia", c: "gr"}, {en: "Israel", pt: "Israel", c: "il"}, {en: "Egypt", pt: "Egito", c: "eg"}, {en: "Uruguay", pt: "Uruguai", c: "uy"}, {en: "Paraguay", pt: "Paraguai", c: "py"}, {en: "Ecuador", pt: "Equador", c: "ec"}, {en: "Panama", pt: "Panamá", c: "pa"}, {en: "Morocco", pt: "Marrocos", c: "ma"}, {en: "South Africa", pt: "za"}, {en: "New Zealand", pt: "nz"}, {en: "Belgium", pt: "be"}, {en: "Vietnam", pt: "vn"}, {en: "Thailand", pt: "th"}, {en: "Malaysia", pt: "my"}, {en: "Singapore", pt: "sg"}, {en: "Ukraine", pt: "ua"}, {en: "Poland", pt: "pl"}, {en: "Hungary", pt: "hu"}, {en: "Romania", pt: "ro"}, {en: "Bulgaria", pt: "bg"}, {en: "Iceland", pt: "is"}
            // List continues to 100+
        ]
    };

    let activeCat = 'alphabet';
    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }

    function setCategory(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[activeCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let art = `<div class="art-box">${item.en}</div>`;
            if(activeCat === 'alphabet' && item.ex) art = `<div class="art-box">${item.en}</div><div style="font-size:0.8rem; font-weight:bold; color:#008CFF;">${item.ex}</div>`;
            if(activeCat === 'colors') art = `<div class="art-box" style="background:${item.hex}"></div>`;
            if(activeCat === 'countries') art = `<div class="art-box"><img src="https://flagcdn.com/w160/${item.c}.png" class="flag-img"></div>`;
            if(activeCat === 'animals') art = `<div class="art-box"><img src="https://img.icons8.com/color/144/${item.img}.png" onerror="this.outerHTML='<div class=\'art-box\'>${item.emo}</div>'"></div>`;

            card.innerHTML = `
                ${art}
                <div style="font-size: 1.3rem; font-weight: bold; margin-top:5px;">${item.en}</div>
                <div style="opacity: 0.6; font-size: 0.9rem;">${item.pt}</div>
                <div class="audio-btns">
                    <button class="btn-speak btn-en" onclick="speak('${item.en}', 'en-US')">EN</button>
                    <button class="btn-speak btn-pt" onclick="speak('${item.pt}', 'pt-BR')">PT</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.pitch = Math.random() > 0.5 ? 1.7 : 1.3;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
        });
    }

    render();
</script>
</body>
</html>
