<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids</title>
    <style>
        :root { --primary: #004AAD; --accent: #FFDE59; --bg: #F0F7FF; --card-bg: #FFFFFF; --text: #004AAD; }
        [data-theme="dark"] { --primary: #FFDE59; --accent: #004AAD; --bg: #121212; --card-bg: #1E1E1E; --text: #FFFFFF; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; text-align: center; }
        header { background: var(--primary); color: var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; }
        .theme-toggle { position: absolute; right: 20px; top: 20px; background: var(--accent); border: none; padding: 10px; border-radius: 50%; cursor: pointer; }
        nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px; gap: 12px; border-bottom: 5px solid var(--primary); justify-content: center; }
        .nav-btn { padding: 10px 20px; background: var(--bg); border: 3px solid var(--primary); border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--primary); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: var(--accent); }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .search-bar { width: 85%; padding: 15px; border-radius: 50px; border: 4px solid var(--primary); margin-bottom: 25px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 12px; box-shadow: 0 6px 0 var(--primary); display: flex; flex-direction: column; height: 240px; }
        .art-box { width: 100%; height: 100px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); font-size: 4.5rem; }
        .flag-img { width: 75%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .audio-btns { margin-top: auto; display: flex; justify-content: center; gap: 8px; }
        .btn-speak { border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { justify-content: flex-start; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>ENGLISH KIDS</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">ABC</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">100 Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">Flags</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Search... / Buscar..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const database = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({ en: l, pt: l })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"}, {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"}, {en: "Pink", pt: "Rosa", hex: "#FFC0CB"}, {en: "Orange", pt: "Laranja", hex: "#FFA500"}, {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"}, {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"}
        ],
        animals: [
            {en: "Lion", pt: "Leão", a: "🦁"}, {en: "Tiger", pt: "Tigre", a: "🐯"}, {en: "Elephant", pt: "Elefante", a: "🐘"}, {en: "Monkey", pt: "Macaco", a: "🐒"}, {en: "Dog", pt: "Cachorro", a: "🐶"}, {en: "Cat", pt: "Gato", a: "🐱"}, {en: "Rabbit", pt: "Coelho", a: "🐰"}, {en: "Giraffe", pt: "Girafa", a: "🦒"}, {en: "Zebra", pt: "Zebra", a: "🦓"}, {en: "Panda", pt: "Panda", a: "🐼"},
            {en: "Bear", pt: "Urso", a: "🐻"}, {en: "Pig", pt: "Porco", a: "🐷"}, {en: "Cow", pt: "Vaca", a: "🐮"}, {en: "Horse", pt: "Cavalo", a: "🐴"}, {en: "Sheep", pt: "Ovelha", a: "🐑"}, {en: "Goat", pt: "Cabra", a: "🐐"}, {en: "Camel", pt: "Camelo", a: "🐪"}, {en: "Llama", pt: "Lhama", a: "🦙"}, {en: "Kangaroo", pt: "Canguru", a: "🦘"}, {en: "Koala", pt: "Coala", a: "🐨"},
            {en: "Wolf", pt: "Lobo", a: "🐺"}, {en: "Fox", pt: "Raposa", a: "🦊"}, {en: "Deer", pt: "Veado", a: "🦌"}, {en: "Rhinoceros", pt: "Rinoceronte", a: "🦏"}, {en: "Hippopotamus", pt: "Hipopótamo", a: "🦛"}, {en: "Crocodile", pt: "Jacaré", a: "🐊"}, {en: "Snake", pt: "Cobra", a: "🐍"}, {en: "Lizard", pt: "Lagarto", a: "🦎"}, {en: "Turtle", pt: "Tartaruga", a: "🐢"}, {en: "Frog", pt: "Sapo", a: "🐸"},
            {en: "Shark", pt: "Tubarão", a: "🦈"}, {en: "Whale", pt: "Baleia", a: "🐳"}, {en: "Dolphin", pt: "Golfinho", a: "🐬"}, {en: "Octopus", pt: "Polvo", a: "🐙"}, {en: "Crab", pt: "Caranguejo", a: "🦀"}, {en: "Lobster", pt: "Lagosta", a: "🦞"}, {en: "Shrimp", pt: "Camarão", a: "🦐"}, {en: "Squid", pt: "Lula", a: "🦑"}, {en: "Fish", pt: "Peixe", a: "🐟"}, {en: "Tropical Fish", pt: "Peixe Tropical", a: "🐠"},
            {en: "Blowfish", pt: "Baiacu", a: "🐡"}, {en: "Eagle", pt: "Águia", a: "🦅"}, {en: "Owl", pt: "Coruja", a: "🦉"}, {en: "Parrot", pt: "Papagaio", a: "🦜"}, {en: "Penguin", pt: "Pinguim", a: "🐧"}, {en: "Duck", pt: "Pato", a: "🦆"}, {en: "Swan", pt: "Cisne", a: "🦢"}, {en: "Chicken", pt: "Galinha", a: "🐔"}, {en: "Rooster", pt: "Galo", a: "🐓"}, {en: "Turkey", pt: "Peru", a: "🦃"},
            {en: "Flamingo", pt: "Flamingo", a: "🦩"}, {en: "Peacock", pt: "Pavão", a: "🦚"}, {en: "Dove", pt: "Pomba", a: "🕊️"}, {en: "Bat", pt: "Morcego", a: "🦇"}, {en: "Bee", pt: "Abelha", a: "🐝"}, {en: "Butterfly", pt: "Borboleta", a: "🦋"}, {en: "Ladybug", pt: "Joaninha", a: "🐞"}, {en: "Ant", pt: "Formiga", a: "🐜"}, {en: "Spider", pt: "Aranha", a: "🕷️"}, {en: "Scorpion", pt: "Escorpião", a: "🦂"},
            {en: "Snail", pt: "Caracol", a: "🐌"}, {en: "Caterpillar", pt: "Lagarta", a: "🐛"}, {en: "Cricket", pt: "Grilo", a: "🦗"}, {en: "Gorilla", pt: "Gorila", a: "🦍"}, {en: "Sloth", pt: "Preguiça", a: "🦥"}, {en: "Otter", pt: "Lontra", a: "🦦"}, {en: "Beaver", pt: "Castor", a: "🦫"}, {en: "Hedgehog", pt: "Ouriço", a: "🦔"}, {en: "Mouse", pt: "Camundongo", a: "🐭"}, {en: "Rat", pt: "Rato", a: "🐀"},
            {en: "Hamster", pt: "Hamster", a: "🐹"}, {en: "Squirrel", pt: "Esquilo", a: "🐿️"}, {en: "Skunk", pt: "Gambá", a: "🦨"}, {en: "Raccoon", pt: "Guaxinim", a: "🦝"}, {en: "Ox", pt: "Boi", a: "🐂"}, {en: "Buffalo", pt: "Búfalo", a: "🐃"}, {en: "Ram", pt: "Carneiro", a: "🐏"}, {en: "Donkey", pt: "Burro", a: "🫏"}, {en: "Seal", pt: "Foca", a: "🦭"}, {en: "Walrus", pt: "Morsa", a: "🦣"},
            {en: "Seahorse", pt: "Cavalo-marinho", a: "🧜"}, {en: "Jellyfish", pt: "Água-viva", a: "🪼"}, {en: "Mosquito", pt: "Mosquito", a: "🦟"}, {en: "Worm", pt: "Minhoca", a: "🪱"}, {en: "Fly", pt: "Mosca", a: "🪰"}, {en: "Beetle", pt: "Besouro", a: "🪲"}, {en: "Cockroach", pt: "Barata", a: "🪳"}, {en: "Grasshopper", pt: "Gafanhoto", a: "🦗"}, {en: "Dinosaur", pt: "Dinossauro", a: "🦖"}, {en: "Dragon", pt: "Dragão", a: "🐲"},
            {en: "Spider Monkey", pt: "Macaco Aranha", a: "🐒"}, {en: "Polar Bear", pt: "Urso Polar", a: "🧊"}, {en: "Black Panther", pt: "Pantera Negra", a: "🐆"}, {en: "Blue Whale", pt: "Baleia Azul", a: "🐋"}, {en: "Honey Bee", pt: "Abelha", a: "🍯"}, {en: "Bull", pt: "Touro", a: "🐂"}, {en: "Chicks", pt: "Pinhos", a: "🐥"}, {en: "Ladybird", pt: "Joaninha", a: "🐞"}, {en: "Sea Turtle", pt: "Tartaruga Marinha", a: "🐢"}, {en: "Eel", pt: "Enguia", a: "🐍"}
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", c: "br"}, {en: "Bangladesh", pt: "Bangladesh", c: "bd"}, {en: "USA", pt: "EUA", c: "us"}, {en: "UK", pt: "Reino Unido", c: "gb"}, {en: "Canada", pt: "Canadá", c: "ca"}, {en: "France", pt: "França", c: "fr"}, {en: "Germany", pt: "Alemanha", c: "de"}, {en: "Italy", pt: "Itália", c: "it"}, {en: "Japan", pt: "Japão", c: "jp"}, {en: "China", pt: "China", c: "cn"}, {en: "Mexico", pt: "México", c: "mx"}, {en: "Argentina", pt: "Argentina", c: "ar"}, {en: "Portugal", pt: "Portugal", c: "pt"}
        ]
    };

    let activeCat = 'alphabet';
    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }

    function setCategory(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[activeCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            let art = `<div class="art-box">${item.en}</div>`;
            if(activeCat === 'colors') art = `<div class="art-box" style="background:${item.hex}"></div>`;
            if(activeCat === 'countries') art = `<div class="art-box"><img src="https://flagcdn.com/w160/${item.c}.png" class="flag-img"></div>`;
            if(activeCat === 'animals') art = `<div class="art-box">${item.a}</div>`;

            card.innerHTML = `${art}
                <div style="font-size: 1.2rem; font-weight: bold; margin-top:5px;">${item.en}</div>
                <div style="opacity: 0.6; font-size: 0.9rem;">${item.pt}</div>
                <div class="audio-btns">
                    <button class="btn-speak btn-en" onclick="speak('${item.en}', 'en-US')">EN</button>
                    <button class="btn-speak btn-pt" onclick="speak('${item.pt}', 'pt-BR')">PT</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.pitch = 1.4;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
        });
    }

    render();
</script>
</body>
</html>
