<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Full Learning Hub</title>
    <style>
        :root {
            --primary: #004AAD;
            --accent: #FFDE59;
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
            --text: #004AAD;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --primary: #FFDE59;
            --accent: #004AAD;
            --bg: #1A1A2E;
            --card-bg: #16213E;
            --text: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* --- Header & Theme Toggle --- */
        header {
            background: var(--primary);
            color: var(--accent);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn {
            position: absolute;
            right: 20px;
            top: 25px;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* --- Navigation Tabs --- */
        nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 10px;
            gap: 10px;
            border-bottom: 4px solid var(--primary);
        }

        .nav-link {
            padding: 10px 20px;
            background: var(--bg);
            border: 2px solid var(--primary);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-link.active {
            background: var(--primary);
            color: var(--accent);
        }

        /* --- Content Grid --- */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 0 var(--primary);
            transition: var(--transition);
            animation: popIn 0.5s ease-out;
        }

        .card:hover { transform: scale(1.05) rotate(2deg); }

        .card h3 { margin: 10px 0 5px 0; font-size: 1.4rem; }
        .card p { margin: 0; font-size: 0.9rem; opacity: 0.8; }
        .card .example { font-size: 0.8rem; font-weight: bold; color: #008CFF; margin-top: 10px; }

        .audio-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-speak {
            background: var(--primary);
            color: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🚀 ENGLISH KIDS</h1>
    <button class="theme-btn" onclick="toggleTheme()">🌓</button>
</header>

<nav id="topNav">
    <div class="nav-link active" onclick="loadTab('alphabet')">A-Z</div>
    <div class="nav-link" onclick="loadTab('numbers')">1-100</div>
    <div class="nav-link" onclick="loadTab('animals')">Animals (300)</div>
    <div class="nav-link" onclick="loadTab('flags')">Flags</div>
    <div class="nav-link" onclick="loadTab('colors')">Colors</div>
    <div class="nav-link" onclick="loadTab('math')">Math & Symbols</div>
</nav>

<div class="container">
    <input type="text" class="search-box" id="search" placeholder="Search for a word... (Procurar...)" onkeyup="filterCards()">
    <div class="grid" id="mainGrid">
        </div>
</div>

<script>
    // --- DATABASE GENERATORS ---
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({
        title: l,
        sub: "Letter " + l,
        example: `${l} is for ...`, // You can fill these specifically
        pt: "Letra " + l
    }));

    const numbers = Array.from({length: 100}, (_, i) => ({
        title: (i + 1).toString(),
        sub: "Number " + (i + 1),
        pt: "Número " + (i + 1)
    }));

    // Example Animals (Simulating a large list)
    const animalNames = ["Lion", "Tiger", "Bear", "Elephant", "Zebra", "Monkey", "Giraffe", "Shark", "Ant", "Bee", "Whale", "Dolphin", "Dog", "Cat", "Horse"];
    const animals = animalNames.map(a => ({ title: a, sub: "Animal", pt: "Animal" })); 

    const colors = [
        {title: "Red", pt: "Vermelho"}, {title: "Blue", pt: "Azul"}, {title: "Yellow", pt: "Amarelo"},
        {title: "Green", pt: "Verde"}, {title: "Purple", pt: "Roxo"}, {title: "Orange", pt: "Laranja"}
    ];

    const currentData = { alphabet, numbers, animals, colors };
    let activeTab = 'alphabet';

    // --- LOGIC ---
    function toggleTheme() {
        const body = document.body;
        body.dataset.theme = body.dataset.theme === "light" ? "dark" : "light";
    }

    function loadTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        const items = currentData[activeTab] || [];

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${item.title}</h3>
                <p>🇧🇷 ${item.pt}</p>
                ${item.example ? `<div class="example">${item.example}</div>` : ''}
                <div class="audio-btns">
                    <button class="btn-speak" onclick="speak('${item.title}', 'en-US')">🇺🇸</button>
                    <button class="btn-speak" style="background:#28a745" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel(); // Stop previous audio
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function filterCards() {
        const query = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(query) ? "block" : "none";
        });
    }

    // Initial Load
    render();
</script>

</body>
</html>
