<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - O Mundo em Suas Mãos</title>
    <style>
        :root {
            --primary: #004AAD;
            --accent: #FFDE59;
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
            --text: #004AAD;
        }

        [data-theme="dark"] {
            --primary: #FFDE59;
            --accent: #004AAD;
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s;
            text-align: center;
        }

        header {
            background: var(--primary);
            color: var(--accent);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 20px;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
        }

        nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 15px;
            gap: 12px;
            border-bottom: 5px solid var(--primary);
            justify-content: flex-start;
            scrollbar-width: none;
        }

        .nav-btn {
            padding: 12px 25px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--accent);
            transform: scale(1.1);
        }

        .container { padding: 20px; max-width: 1400px; margin: auto; }

        .search-bar {
            width: 90%;
            padding: 18px;
            border-radius: 50px;
            border: 4px solid var(--primary);
            margin-bottom: 30px;
            font-size: 1.2rem;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 0 var(--primary);
            transition: 0.3s;
            border: 2px solid transparent;
            animation: popIn 0.4s ease-out;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .art-box {
            width: 100%;
            height: 120px;
            background: #eee;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            overflow: hidden;
        }

        .art-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn-audio {
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .art-box { height: 80px; font-size: 3rem; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🚀 ENGLISH KIDS 🇧🇷</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">A-Z</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">Countries</button>
    <button class="nav-btn" onclick="setCategory('symbols', this)">Symbols</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Find something... / Encontre algo..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const database = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({ en: l, pt: l })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"},
            {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"},
            {en: "Orange", pt: "Laranja", hex: "#FFA500"}, {en: "Pink", pt: "Rosa", hex: "#FFC0CB"},
            {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"},
            {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"}
        ],
        animals: [
            {en: "Lion", pt: "Leão"}, {en: "Tiger", pt: "Tigre"}, {en: "Elephant", pt: "Elefante"},
            {en: "Monkey", pt: "Macaco"}, {en: "Giraffe", pt: "Girafa"}, {en: "Zebra", pt: "Zebra"},
            {en: "Shark", pt: "Tubarão"}, {en: "Whale", pt: "Baleia"}, {en: "Dolphin", pt: "Golfinho"},
            {en: "Snake", pt: "Cobra"}, {en: "Eagle", pt: "Águia"}, {en: "Parrot", pt: "Papagaio"},
            {en: "Dog", pt: "Cachorro"}, {en: "Cat", pt: "Gato"}, {en: "Horse", pt: "Cavalo"},
            {en: "Cow", pt: "Vaca"}, {en: "Pig", pt: "Porco"}, {en: "Rabbit", pt: "Coelho"},
            {en: "Panda", pt: "Panda"}, {en: "Koala", pt: "Coala"}, {en: "Kangaroo", pt: "Canguru"},
            {en: "Spider", pt: "Aranha"}, {en: "Butterfly", pt: "Borboleta"}, {en: "Bee", pt: "Abelha"}
            // Add more here easily!
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", f: "🇧🇷"}, {en: "USA", pt: "EUA", f: "🇺🇸"},
            {en: "UK", pt: "Reino Unido", f: "🇬🇧"}, {en: "Canada", pt: "Canadá", f: "🇨🇦"},
            {en: "France", pt: "França", f: "🇫🇷"}, {en: "Germany", pt: "Alemanha", f: "🇩🇪"},
            {en: "Italy", pt: "Itália", f: "🇮🇹"}, {en: "Japan", pt: "Japão", f: "🇯🇵"},
            {en: "China", pt: "China", f: "🇨🇳"}, {en: "Mexico", pt: "México", f: "🇲🇽"},
            {en: "Portugal", pt: "Portugal", f: "🇵🇹"}, {en: "Argentina", pt: "Argentina", f: "🇦🇷"},
            {en: "Spain", pt: "Espanha", f: "🇪🇸"}, {en: "Australia", pt: "Austrália", f: "🇦🇺"}
        ],
        symbols: [
            {en: "Comma", pt: "Vírgula", s: ","}, {en: "Full Stop", pt: "Ponto Final", s: "."},
            {en: "Question Mark", pt: "Interrogação", s: "?"}, {en: "Exclamation", pt: "Exclamação", s: "!"},
            {en: "Plus", pt: "Mais", s: "+"}, {en: "Minus", pt: "Menos", s: "-"},
            {en: "Multiply", pt: "Vezes", s: "×"}, {en: "Divide", pt: "Dividir", s: "÷"}
        ]
    };

    let currentCat = 'alphabet';

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function setCategory(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[currentCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let art = `<div class="art-box">${item.en}</div>`;
            
            if(currentCat === 'colors') art = `<div class="art-box" style="background:${item.hex}"></div>`;
            if(currentCat === 'countries') art = `<div class="art-box">${item.f}</div>`;
            if(currentCat === 'symbols') art = `<div class="art-box" style="color:var(--primary)">${item.s}</div>`;
            if(currentCat === 'animals') {
                // This uses a public placeholder for cute animal icons
                art = `<div class="art-box"><img src="https://img.icons8.com/color/144/000000/${item.en.toLowerCase()}.png" alt="${item.en}" onerror="this.src='🐾'"></div>`;
            }

            card.innerHTML = `
                ${art}
                <div style="font-size: 1.6rem; font-weight: bold;">${item.en}</div>
                <div style="opacity: 0.7;">🇧🇷 ${item.pt}</div>
                <div style="margin-top: 15px;">
                    <button class="btn-audio btn-en" onclick="speak('${item.en}', 'en-US')">🇺🇸 EN</button>
                    <button class="btn-audio btn-pt" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷 PT</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        
        // Random Child Voice Logic
        const isGirl = Math.random() > 0.5;
        msg.pitch = isGirl ? 1.7 : 1.3;
        msg.rate = 0.8;
        
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    render();
</script>

</body>
</html>
