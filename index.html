<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids - Aprendizado Divertido</title>
    <style>
        :root {
            --primary: #004AAD;
            --accent: #FFDE59;
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
            --text: #004AAD;
        }

        [data-theme="dark"] {
            --primary: #FFDE59;
            --accent: #004AAD;
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s;
            text-align: center;
        }

        header {
            background: var(--primary);
            color: var(--accent);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 20px;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
        }

        nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 15px;
            gap: 12px;
            border-bottom: 5px solid var(--primary);
            justify-content: center;
            scrollbar-width: none;
        }

        .nav-btn {
            padding: 12px 25px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--accent);
            transform: scale(1.1);
        }

        .container { padding: 20px; max-width: 1400px; margin: auto; }

        .search-bar {
            width: 85%;
            padding: 18px;
            border-radius: 50px;
            border: 4px solid var(--primary);
            margin-bottom: 30px;
            font-size: 1.2rem;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 0 var(--primary);
            transition: 0.3s;
            border: 2px solid transparent;
            animation: popIn 0.4s ease-out;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .art-display {
            width: 100%;
            height: 100px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: rgba(0,0,0,0.05);
        }

        .btn-audio {
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            font-size: 0.9rem;
        }

        .btn-en { background: var(--primary); color: var(--accent); }
        .btn-pt { background: #28a745; color: white; }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            nav { justify-content: flex-start; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <h1>🌟 ENGLISH KIDS 🌟</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<nav>
    <button class="nav-btn active" onclick="setCategory('alphabet', this)">A-Z</button>
    <button class="nav-btn" onclick="setCategory('numbers', this)">1-100</button>
    <button class="nav-btn" onclick="setCategory('colors', this)">20 Colors</button>
    <button class="nav-btn" onclick="setCategory('animals', this)">Animals</button>
    <button class="nav-btn" onclick="setCategory('countries', this)">Flags</button>
    <button class="nav-btn" onclick="setCategory('symbols', this)">Symbols</button>
</nav>

<div class="container">
    <input type="text" class="search-bar" placeholder="Pesquisar... / Search..." onkeyup="doSearch()">
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    const database = {
        alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => ({ en: l, pt: l })),
        numbers: Array.from({length: 100}, (_, i) => ({ en: (i+1).toString(), pt: (i+1).toString() })),
        colors: [
            {en: "Red", pt: "Vermelho", hex: "#FF0000"}, {en: "Blue", pt: "Azul", hex: "#0000FF"},
            {en: "Yellow", pt: "Amarelo", hex: "#FFFF00"}, {en: "Green", pt: "Verde", hex: "#008000"},
            {en: "Orange", pt: "Laranja", hex: "#FFA500"}, {en: "Pink", pt: "Rosa", hex: "#FFC0CB"},
            {en: "Purple", pt: "Roxo", hex: "#800080"}, {en: "Brown", pt: "Marrom", hex: "#A52A2A"},
            {en: "Black", pt: "Preto", hex: "#000000"}, {en: "White", pt: "Branco", hex: "#FFFFFF"},
            {en: "Gray", pt: "Cinza", hex: "#808080"}, {en: "Cyan", pt: "Ciano", hex: "#00FFFF"},
            {en: "Magenta", pt: "Magenta", hex: "#FF00FF"}, {en: "Silver", pt: "Prata", hex: "#C0C0C0"},
            {en: "Gold", pt: "Dourado", hex: "#FFD700"}, {en: "Beige", pt: "Bege", hex: "#F5F5DC"},
            {en: "Navy", pt: "Azul Marinho", hex: "#000080"}, {en: "Olive", pt: "Oliva", hex: "#808000"},
            {en: "Teal", pt: "Azul-petróleo", hex: "#008080"}, {en: "Maroon", pt: "Bordô", hex: "#800000"}
        ],
        animals: [
            {en: "Lion", pt: "Leão", art: "🦁"}, {en: "Tiger", pt: "Tigre", art: "🐯"},
            {en: "Elephant", pt: "Elefante", art: "🐘"}, {en: "Monkey", pt: "Macaco", art: "🐒"},
            {en: "Giraffe", pt: "Girafa", art: "🦒"}, {en: "Zebra", pt: "Zebra", art: "🦓"},
            {en: "Dog", pt: "Cachorro", art: "🐶"}, {en: "Cat", pt: "Gato", art: "🐱"},
            {en: "Rabbit", pt: "Coelho", art: "🐰"}, {en: "Panda", pt: "Panda", art: "🐼"},
            {en: "Koala", pt: "Coala", art: "🐨"}, {en: "Bear", pt: "Urso", art: "🐻"},
            {en: "Pig", pt: "Porco", art: "🐷"}, {en: "Cow", pt: "Vaca", art: "🐮"},
            {en: "Chicken", pt: "Galinha", art: "🐔"}, {en: "Snake", pt: "Cobra", art: "🐍"},
            {en: "Turtle", pt: "Tartaruga", art: "🐢"}, {en: "Frog", pt: "Sapo", art: "🐸"},
            {en: "Whale", pt: "Baleia", art: "🐳"}, {en: "Shark", pt: "Tubarão", art: "🦈"},
            {en: "Octopus", pt: "Polvo", art: "🐙"}, {en: "Butterfly", pt: "Borboleta", art: "🦋"},
            {en: "Bee", pt: "Abelha", art: "🐝"}, {en: "Ant", pt: "Formiga", art: "🐜"}
        ],
        countries: [
            {en: "Brazil", pt: "Brasil", flag: "🇧🇷"}, {en: "USA", pt: "EUA", flag: "🇺🇸"},
            {en: "UK", pt: "Reino Unido", flag: "🇬🇧"}, {en: "Canada", pt: "Canadá", flag: "🇨🇦"},
            {en: "France", pt: "França", flag: "🇫🇷"}, {en: "Germany", pt: "Alemanha", flag: "🇩🇪"},
            {en: "Italy", pt: "Itália", flag: "🇮🇹"}, {en: "Japan", pt: "Japão", flag: "🇯🇵"},
            {en: "China", pt: "China", flag: "🇨🇳"}, {en: "Mexico", pt: "México", flag: "🇲🇽"},
            {en: "Portugal", pt: "Portugal", flag: "🇵🇹"}, {en: "Argentina", pt: "Argentina", flag: "🇦🇷"},
            {en: "Australia", pt: "Austrália", flag: "🇦🇺"}, {en: "Spain", pt: "Espanha", flag: "🇪🇸"}
        ],
        symbols: [
            {en: "Comma", pt: "Vírgula", s: ","}, {en: "Full Stop", pt: "Ponto Final", s: "."},
            {en: "Question Mark", pt: "Interrogação", s: "?"}, {en: "Exclamation", pt: "Exclamação", s: "!"},
            {en: "Plus", pt: "Mais", s: "+"}, {en: "Minus", pt: "Menos", s: "-"},
            {en: "Times", pt: "Vezes", s: "×"}, {en: "Divide", pt: "Dividir", s: "÷"}
        ]
    };

    let currentCat = 'alphabet';

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function setCategory(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        database[currentCat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let artContent = item.en;
            let bgColor = "rgba(0,0,0,0.05)";

            if(currentCat === 'colors') { artContent = ""; bgColor = item.hex; }
            if(currentCat === 'animals') artContent = item.art;
            if(currentCat === 'countries') artContent = item.flag;
            if(currentCat === 'symbols') artContent = item.s;

            card.innerHTML = `
                <div class="art-display" style="background:${bgColor}">${artContent}</div>
                <div style="font-size: 1.5rem; font-weight: bold;">${item.en}</div>
                <div style="opacity: 0.7;">🇧🇷 ${item.pt}</div>
                <div style="margin-top: 15px;">
                    <button class="btn-audio btn-en" onclick="speak('${item.en}', 'en-US')">🇺🇸 Speak</button>
                    <button class="btn-audio btn-pt" onclick="speak('${item.pt}', 'pt-BR')">🇧🇷 Fala</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        
        // Random Child Voice Logic
        const isGirl = Math.random() > 0.5;
        msg.pitch = isGirl ? 1.8 : 1.3;
        msg.rate = 0.8;
        
        window.speechSynthesis.speak(msg);
    }

    function doSearch() {
        const q = document.querySelector('.search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    render();
</script>
</body>
</html>
